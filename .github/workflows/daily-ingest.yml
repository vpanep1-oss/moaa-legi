name: Daily Ingest

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger backend ingest endpoint
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "x-ingest-token: ${{ secrets.INGEST_SECRET }}" \
            "https://moaa-legi.com/api/ingest/daily"
