name: Daily Ingest

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger backend ingest endpoint
        if: ${{ secrets.BACKEND_INGEST_URL != '' && secrets.INGEST_SECRET != '' }}
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "x-ingest-token: ${{ secrets.INGEST_SECRET }}" \
            "${{ secrets.BACKEND_INGEST_URL }}/api/ingest/daily"
