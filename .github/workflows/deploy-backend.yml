name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install backend dependencies
        working-directory: backend
        run: npm install
      - name: Build backend
        working-directory: backend
        run: npm run build
      - name: Deploy to DigitalOcean
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: root@167.172.158.216
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 167.172.158.216 >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key $DEPLOY_HOST << 'EOF'
          cd /home/moaa-legi
          git pull origin main
          cd backend
          npm install
          npm run build
          pm2 restart moaa-backend
          EOF
