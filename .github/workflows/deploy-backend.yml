name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install backend dependencies
        working-directory: backend
        run: npm install
      - name: Clean backend
        working-directory: backend
        run: Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue; Write-Host "Cleaned dist"
        shell: powershell
      - name: Build backend
        working-directory: backend
        run: npm run build
      - name: Deploy to Render
        env:
          RENDER_DEPLOY_URL: ${{ secrets.RENDER_DEPLOY_URL }}
          PORT: ${{ secrets.PORT || '4000' }}
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          RUN_INGEST_ON_START: 'false'
        run: |
          echo "Deploying to Render..."
          curl "${{ secrets.RENDER_DEPLOY_URL }}"
