name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ vars.BACKEND_URL || 'http://localhost:4000' }}
        run: npm run build
      - name: Deploy to DigitalOcean
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: root@167.172.158.216
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 167.172.158.216 >> ~/.ssh/known_hosts
          scp -i ~/.ssh/deploy_key -r frontend/dist/* $DEPLOY_HOST:/var/www/moaa-legi/
          ssh -i ~/.ssh/deploy_key $DEPLOY_HOST "chown -R www-data:www-data /var/www/moaa-legi"
