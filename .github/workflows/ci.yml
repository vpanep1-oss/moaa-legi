name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install backend dependencies
        working-directory: backend
        run: npm install
      - name: Clean backend
        working-directory: backend
        run: Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue; Write-Host "Cleaned dist"
        shell: powershell
      - name: Build backend
        working-directory: backend
        run: npm run build
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Build frontend
        working-directory: frontend
        run: npm run build
